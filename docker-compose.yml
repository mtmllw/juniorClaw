services:
  openclaw-gateway:
    build: .
    image: openclaw-custom:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    network_mode: "host"
    privileged: true # Added for full system access
    user: root # Added to run internal processes as root
    group_add:
      - "${DOCKER_GID:-982}" # Host docker group ID for socket permissions
    volumes:
      - ./data:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
      - ./data:/root/.openclaw
      - ./workspace:/root/.openclaw/workspace
      # Enable if using local docker socket for agent sandboxing
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      - OPENCLAW_GATEWAY_BIND=0.0.0.0
      - OPENCLAW_SANDBOX=1
    healthcheck:
      test: [ "CMD", "python3", "-c", "import socket; s=socket.socket(); s.connect(('127.0.0.1', 18789)); s.close()" ]
      interval: 30s
      timeout: 10s
      retries: 3

  openclaw-cli:
    build: .
    image: openclaw-custom:latest
    container_name: openclaw-cli
    profiles:
      - cli
    privileged: true # Added for full system access
    user: root # Added to run internal processes as root
    group_add:
      - "${DOCKER_GID:-982}" # Host docker group ID
    volumes:
      - ./data:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
      - /var/run/docker.sock:/var/run/docker.sock # Added for Docker-in-Docker control
    env_file:
      - .env
