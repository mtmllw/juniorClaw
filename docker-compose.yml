services:
  openclaw-gateway:
    build: .
    image: openclaw-custom:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    network_mode: "host"
    group_add:
      - "${DOCKER_GID:-982}" # Host docker group ID for socket permissions
    volumes:
      - ./data:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
      # Enable if using local docker socket for agent sandboxing
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      - OPENCLAW_GATEWAY_BIND=0.0.0.0
      - OPENCLAW_SANDBOX=1
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz" ]
      interval: 30s
      timeout: 10s
      retries: 3

  openclaw-cli:
    build: .
    image: openclaw-custom:latest
    container_name: openclaw-cli
    profiles:
      - cli
    group_add:
      - "${DOCKER_GID:-982}" # Host docker group ID
    volumes:
      - ./data:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace

    env_file:
      - .env
